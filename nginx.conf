# /etc/nginx/sites-available/lexed.in
# Wildcard subdomain → Next.js on port 3000

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name *.lexed.in lexed.in;
    return 301 https://$host$request_uri;
}

# HTTPS — all subdomains
server {
    listen 443 ssl;
    server_name *.lexed.in lexed.in;

    ssl_certificate     /etc/letsencrypt/live/lexed.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lexed.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options         DENY;
    add_header X-Content-Type-Options  nosniff;
    add_header Referrer-Policy         strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 60s;
    }

    # Static files — longer cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
